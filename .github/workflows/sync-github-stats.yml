name: Sync GitHub Stats

on:
  schedule:
    - cron: "0 3 * * 1" # 每週一 UTC 03:00
  workflow_dispatch:

jobs:
  sync:
    name: Update data/github-stats.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repos and generate stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api users/luboblu/repos --paginate \
            --jq '[.[] | select(.fork == false)]' | python3 -c "
          import json, sys
          from datetime import datetime, timezone

          repos = json.load(sys.stdin)
          langs = {}
          total_stars = 0
          for r in repos:
              total_stars += r['stargazers_count']
              if r.get('language'):
                  langs[r['language']] = langs.get(r['language'], 0) + 1

          lang_list = sorted([{'language': k, 'count': v} for k, v in langs.items()], key=lambda x: -x['count'])
          total_with_lang = sum(l['count'] for l in lang_list) or 1
          for l in lang_list:
              l['percent'] = round(l['count'] / total_with_lang * 100)

          recent = sorted(repos, key=lambda r: r['updated_at'], reverse=True)[:6]

          result = {
              'login': 'luboblu',
              'name': '盧信廷 Lu Bob',
              'avatar_url': 'https://avatars.githubusercontent.com/u/104414704?v=4',
              'followers': 14,
              'following': 17,
              'total_repos': len(repos),
              'total_stars': total_stars,
              'top_languages': lang_list[:5],
              'recent_repos': [{'name': r['name'], 'description': r['description'], 'language': r['language'], 'stars': r['stargazers_count'], 'url': r['html_url'], 'updated_at': r['updated_at'][:10]} for r in recent],
              'updated_at': datetime.now(timezone.utc).strftime('%Y-%m-%d')
          }
          print(json.dumps(result, indent=2, ensure_ascii=False))
          " > data/github-stats.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet data/github-stats.json || (
            git add data/github-stats.json &&
            git commit -m "chore: update github-stats.json"
          )
          git push
