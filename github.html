<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/images/favicon.png" />
    <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png" />
    <link rel="canonical" href="https://luboblu.github.io/github.html" />
    <meta name="description" content="Hsin-Ting Lu 的 GitHub 專案、程式語言統計與 ORCID 論文發表。" />
    <title>GitHub Stats - Hsin-Ting Lu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Alice|Open+Sans:400,300,700" />
    <link rel="stylesheet" href="assets/css/styles-updated.css" />
    <link rel="stylesheet" href="assets/css/accessibility.css" />
    <style>
      body { background: #f8f9fa; font-family: 'Open Sans', sans-serif; }

      .gh-page-header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fff;
        padding: 20px 0 0;
      }
      .gh-back-btn {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        font-size: 14px;
        padding: 6px 16px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 20px;
        transition: all 0.2s;
      }
      .gh-back-btn:hover { color: #fff; border-color: #fff; }
      .gh-open-btn {
        color: #4a9eff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }
      .gh-open-btn:hover { color: #74b8ff; }
      .gh-header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px 16px;
        max-width: 960px;
        margin: 0 auto;
      }
      .gh-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin: 0; }

      .gh-main { max-width: 960px; margin: 32px auto; padding: 0 16px 60px; }

      /* 上方兩欄 */
      .gh-top-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-bottom: 20px; }
      @media (max-width: 700px) { .gh-top-grid { grid-template-columns: 1fr; } }

      .gh-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        padding: 24px;
      }

      /* Profile card */
      .gh-profile-avatar { width: 64px; height: 64px; border-radius: 50%; margin-right: 16px; }
      .gh-profile-login { font-size: 13px; color: #888; }
      .gh-profile-name { font-size: 18px; font-weight: 700; color: #1a1a2e; margin: 2px 0; }
      .gh-profile-updated { font-size: 12px; color: #aaa; }
      .gh-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
      .gh-stat-box {
        background: #f8f9fa;
        border-radius: 12px;
        padding: 14px 16px;
      }
      .gh-stat-num { font-size: 28px; font-weight: 700; color: #1a1a2e; line-height: 1; }
      .gh-stat-label { font-size: 11px; color: #888; margin-top: 4px; }
      .gh-stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

      /* Lang bars */
      .gh-langs { margin-top: 20px; }
      .gh-lang-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
      .gh-lang-name { width: 90px; font-size: 13px; color: #555; flex-shrink: 0; }
      .gh-lang-bar-wrap { flex: 1; background: #eee; border-radius: 6px; height: 8px; overflow: hidden; }
      .gh-lang-bar { height: 8px; border-radius: 6px; }
      .gh-lang-count { font-size: 12px; color: #888; width: 30px; text-align: right; flex-shrink: 0; }

      .lang-color-Python     { background: #3572A5; }
      .lang-color-HTML       { background: #e34c26; }
      .lang-color-JavaScript { background: #f1e05a; }
      .lang-color-AMPL       { background: #6e8b74; }
      .lang-color-default    { background: #8e8e93; }

      /* Contribution card */
      .gh-contrib-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
      .gh-contrib-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
      .gh-contrib-img { width: 100%; border-radius: 8px; }

      /* Recent repos */
      .gh-section-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
      .gh-repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
      .gh-repo-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        padding: 16px 18px;
        text-decoration: none;
        color: inherit;
        display: block;
        transition: box-shadow 0.2s, transform 0.2s;
        border: 1px solid #eee;
      }
      .gh-repo-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.12); transform: translateY(-2px); color: inherit; text-decoration: none; }
      .gh-repo-name {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 4px;
        min-width: 0;
      }
      .gh-repo-name-text {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }
      .gh-repo-badge {
        flex-shrink: 0;
        font-size: 10px;
        background: #e8f4fd;
        color: #4a9eff;
        border-radius: 4px;
        padding: 1px 6px;
      }
      .gh-repo-desc { font-size: 12px; color: #888; margin-bottom: 10px; min-height: 16px;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .gh-repo-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: #aaa; flex-wrap: wrap; }
      .gh-repo-lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; flex-shrink: 0; }

      @media (max-width: 600px) {
        .gh-top-grid { grid-template-columns: 1fr; }
        .gh-repo-grid { grid-template-columns: 1fr; }
        .gh-main { padding: 0 12px 40px; }
        .gh-stat-row { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="gh-page-header">
      <div class="gh-header-bar">
        <div style="display:flex;align-items:center;gap:16px;">
          <a href="index.html" class="gh-back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
          <h1 class="gh-title"><i class="fab fa-github"></i> GITHUB</h1>
        </div>
        <a href="https://github.com/luboblu" target="_blank" rel="noopener noreferrer" class="gh-open-btn">
          開啟 GitHub <i class="fas fa-external-link-alt" style="font-size:11px;"></i>
        </a>
      </div>
    </div>

    <div class="gh-main">
      <!-- 上方兩欄 -->
      <div class="gh-top-grid">
        <!-- 左：Profile + stats + lang -->
        <div class="gh-card">
          <div style="display:flex;align-items:center;">
            <img id="gh-avatar" src="" alt="avatar" class="gh-profile-avatar" />
            <div>
              <div class="gh-profile-login" id="gh-login">luboblu</div>
              <div class="gh-profile-name" id="gh-name">盧信廷 Lu Bob</div>
              <div class="gh-profile-updated">更新於 <span id="gh-updated">—</span></div>
            </div>
          </div>

          <div class="gh-stat-row">
            <div class="gh-stat-box">
              <div class="gh-stat-num" id="gh-repos">—</div>
              <div class="gh-stat-label">公開 Repos</div>
              <div class="gh-stat-sub">Public repositories</div>
            </div>
            <div class="gh-stat-box">
              <div class="gh-stat-num" id="gh-stars">—</div>
              <div class="gh-stat-label">Stars 獲得</div>
              <div class="gh-stat-sub">Total stars received</div>
            </div>
          </div>

          <div class="gh-langs" id="gh-langs-section">
            <!-- JS 填入 -->
          </div>
        </div>

        <!-- 右：Contribution heatmap + streak + stats -->
        <div class="gh-card" style="display:flex;flex-direction:column;gap:20px;">
          <div>
            <div class="gh-contrib-title">貢獻活動紀錄</div>
            <div class="gh-contrib-sub">GitHub 公開貢獻紀錄</div>
            <img
              src="https://ghchart.rshah.org/luboblu"
              alt="GitHub contribution chart"
              class="gh-contrib-img"
              onerror="this.style.display='none'" loading="lazy" />
          </div>

          <div>
            <div class="gh-contrib-title">連續貢獻紀錄</div>
            <div class="gh-contrib-sub">當前連續天數・最長紀錄・總貢獻</div>
            <img
              src="https://streak-stats.demolab.com?user=luboblu&theme=default&hide_border=true&locale=zh_Hant&date_format=Y-m-d"
              alt="GitHub streak stats"
              class="gh-contrib-img"
              onerror="this.style.display='none'" loading="lazy" />
          </div>

          <div>
            <div class="gh-contrib-title">整體統計</div>
            <div class="gh-contrib-sub">Stars・Commits・PRs・Issues・貢獻排名</div>
            <img
              src="https://github-readme-stats.vercel.app/api?username=luboblu&show_icons=true&hide_border=true&title_color=1a1a2e&icon_color=4a9eff&text_color=555&bg_color=ffffff&include_all_commits=true&count_private=false&locale=zh-tw"
              alt="GitHub readme stats"
              class="gh-contrib-img"
              onerror="this.style.display='none'" loading="lazy" />
          </div>
        </div>
      </div>

      <!-- 最近 Repos -->
      <div class="gh-section-title">最近更新</div>
      <div class="gh-repo-grid" id="gh-repo-grid">
        <!-- JS 填入 -->
      </div>

      <!-- ORCID Publications -->
      <div class="gh-section-title" style="margin-top:40px;">論文發表 Publications</div>
      <div id="pub-list" style="margin-bottom:40px;">
        <div style="text-align:center;padding:30px 0;color:#aaa;">
          <i class="fas fa-spinner fa-spin fa-2x"></i>
        </div>
      </div>
      <p style="text-align:center;font-size:0.82rem;color:#aaa;margin-bottom:32px;">
        <a href="https://orcid.org/0009-0008-3920-4760" target="_blank" rel="noopener noreferrer" style="color:#aaa;text-decoration:none;">
          <img src="https://orcid.org/sites/default/files/images/orcid_16x16.png" alt="ORCID" style="vertical-align:middle;margin-right:4px;" loading="lazy">
          ORCID: 0009-0008-3920-4760
        </a>
      </p>
    </div>

    <script>
      const LANG_COLORS = {
        Python: '#3572A5', HTML: '#e34c26', JavaScript: '#f1e05a',
        AMPL: '#6e8b74', CSS: '#563d7c', TypeScript: '#2b7489',
      };

      const escapeHtml = (value) => String(value ?? '').replace(
        /[&<>'"]/g,
        character => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        })[character]
      );

      const safeExternalUrl = (value, base = 'https://github.com/') => {
        try {
          const url = new URL(String(value), base);
          return url.protocol === 'https:' ? url.href : '#';
        } catch {
          return '#';
        }
      };

      fetch('data/github-stats.json')
        .then(r => r.json())
        .then(data => {
          document.getElementById('gh-avatar').src = data.avatar_url;
          document.getElementById('gh-login').textContent = data.login;
          document.getElementById('gh-name').textContent = data.name;
          document.getElementById('gh-updated').textContent = data.updated_at;
          document.getElementById('gh-repos').textContent = data.total_repos;
          document.getElementById('gh-stars').textContent = data.total_stars;

          // Language bars
          const maxCount = data.top_languages[0]?.count || 1;
          const langsHtml = data.top_languages.map(l => {
            const color = LANG_COLORS[l.language] || '#8e8e93';
            const pct = Math.round(l.count / maxCount * 100);
            return `
              <div class="gh-lang-row">
                <span class="gh-lang-name">${escapeHtml(l.language)}</span>
                <div class="gh-lang-bar-wrap">
                  <div class="gh-lang-bar" style="width:${pct}%;background:${color};"></div>
                </div>
                <span class="gh-lang-count">${escapeHtml(l.count)}</span>
              </div>`;
          }).join('');
          document.getElementById('gh-langs-section').innerHTML =
            `<div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:12px;">主要語言</div>` + langsHtml;

          // Recent repos
          const repoHtml = data.recent_repos.map(r => {
            const color = LANG_COLORS[r.language] || '#8e8e93';
            const lang = escapeHtml(r.language || 'N/A');
            const desc = escapeHtml(r.description || '');
            const fullNameRaw = r.full_name || r.name;
            const fullName = escapeHtml(fullNameRaw);
            const repoUrl = safeExternalUrl(r.url);
            const isCollab = !String(fullNameRaw).startsWith('luboblu/');
            const badge = isCollab
              ? `<span class="gh-repo-badge">協作</span>`
              : '';
            return `
              <a class="gh-repo-card" href="${repoUrl}" target="_blank" rel="noopener noreferrer">
                <div class="gh-repo-name">
                  <i class="fas fa-book" style="font-size:11px;color:#aaa;flex-shrink:0;"></i>
                  <span class="gh-repo-name-text" title="${fullName}">${fullName}</span>
                  ${badge}
                </div>
                <div class="gh-repo-desc">${desc}</div>
                <div class="gh-repo-meta">
                  <span><span class="gh-repo-lang-dot" style="background:${color};"></span>${lang}</span>
                  <span><i class="fas fa-star" style="font-size:10px;"></i> ${escapeHtml(r.stars)}</span>
                  <span><i class="fas fa-clock" style="font-size:10px;"></i> ${escapeHtml(r.updated_at)}</span>
                </div>
              </a>`;
          }).join('');
          document.getElementById('gh-repo-grid').innerHTML = repoHtml;
        })
        .catch(() => {
          document.getElementById('gh-repo-grid').innerHTML =
            '<p style="color:#aaa;text-align:center;">資料載入失敗</p>';
        });

      // ORCID publications
      const TYPE_LABEL = {
        'journal-article': { label: '期刊論文', color: '#2563eb' },
        'conference-paper': { label: '研討會論文', color: '#16a34a' },
      };

      fetch('data/orcid.json')
        .then(r => r.json())
        .then(data => {
          const pubs = data.publications || [];
          if (!pubs.length) {
            document.getElementById('pub-list').innerHTML =
              '<p style="color:#aaa;text-align:center;">暫無論文資料</p>';
            return;
          }
          const html = pubs.map(p => {
            const t = TYPE_LABEL[p.type] || { label: escapeHtml(p.type), color: '#666' };
            const doiUrl = p.doi ? safeExternalUrl(`https://doi.org/${encodeURIComponent(p.doi)}`) : '';
            const doi = p.doi
              ? `<a href="${doiUrl}" target="_blank" rel="noopener noreferrer"
                   style="font-size:0.82rem;color:#4a9eff;text-decoration:none;font-weight:500;">
                   <i class="fas fa-external-link-alt" style="font-size:10px;"></i> DOI
                 </a>`
              : '';
            return `
              <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;
                          padding:18px 22px;margin-bottom:14px;
                          transition:box-shadow 0.2s,transform 0.2s;"
                   onmouseover="this.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)';this.style.transform='translateY(-2px)'"
                   onmouseout="this.style.boxShadow='none';this.style.transform='translateY(0)'">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                  <span style="font-size:0.82rem;font-weight:700;color:#6b7280;
                                background:#f3f4f6;padding:2px 10px;border-radius:20px;">${escapeHtml(p.year || '—')}</span>
                  <span style="font-size:0.76rem;font-weight:600;padding:2px 10px;border-radius:20px;
                                background:${t.color}18;color:${t.color};border:1px solid ${t.color}40;">${t.label}</span>
                </div>
                <div style="font-size:0.97rem;font-weight:600;color:#1f2937;margin-bottom:5px;line-height:1.5;">${escapeHtml(p.title)}</div>
                <div style="font-size:0.85rem;color:#6b7280;font-style:italic;margin-bottom:6px;">${escapeHtml(p.venue || '')}</div>
                ${doi}
              </div>`;
          }).join('');
          document.getElementById('pub-list').innerHTML = html;
        })
        .catch(() => {
          document.getElementById('pub-list').innerHTML =
            '<p style="color:#aaa;text-align:center;">無法載入論文資料</p>';
        });
    </script>
  </body>
</html>
