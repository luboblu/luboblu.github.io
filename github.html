<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Stats - Hsin-Ting Lu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Alice|Open+Sans:400,300,700" />
    <link rel="stylesheet" href="assets/css/styles-updated.css" />
    <style>
      body { background: #f8f9fa; font-family: 'Open Sans', sans-serif; }

      .gh-page-header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        color: #fff;
        padding: 20px 0 0;
      }
      .gh-back-btn {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        font-size: 14px;
        padding: 6px 16px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 20px;
        transition: all 0.2s;
      }
      .gh-back-btn:hover { color: #fff; border-color: #fff; }
      .gh-open-btn {
        color: #4a9eff;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }
      .gh-open-btn:hover { color: #74b8ff; }
      .gh-header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 24px 16px;
        max-width: 960px;
        margin: 0 auto;
      }
      .gh-title { font-size: 20px; font-weight: 700; letter-spacing: 1px; margin: 0; }

      .gh-main { max-width: 960px; margin: 32px auto; padding: 0 16px 60px; }

      /* 上方兩欄 */
      .gh-top-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; margin-bottom: 20px; }
      @media (max-width: 700px) { .gh-top-grid { grid-template-columns: 1fr; } }

      .gh-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        padding: 24px;
      }

      /* Profile card */
      .gh-profile-avatar { width: 64px; height: 64px; border-radius: 50%; margin-right: 16px; }
      .gh-profile-login { font-size: 13px; color: #888; }
      .gh-profile-name { font-size: 18px; font-weight: 700; color: #1a1a2e; margin: 2px 0; }
      .gh-profile-updated { font-size: 12px; color: #aaa; }
      .gh-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
      .gh-stat-box {
        background: #f8f9fa;
        border-radius: 12px;
        padding: 14px 16px;
      }
      .gh-stat-num { font-size: 28px; font-weight: 700; color: #1a1a2e; line-height: 1; }
      .gh-stat-label { font-size: 11px; color: #888; margin-top: 4px; }
      .gh-stat-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

      /* Lang bars */
      .gh-langs { margin-top: 20px; }
      .gh-lang-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
      .gh-lang-name { width: 90px; font-size: 13px; color: #555; flex-shrink: 0; }
      .gh-lang-bar-wrap { flex: 1; background: #eee; border-radius: 6px; height: 8px; overflow: hidden; }
      .gh-lang-bar { height: 8px; border-radius: 6px; }
      .gh-lang-count { font-size: 12px; color: #888; width: 30px; text-align: right; flex-shrink: 0; }

      .lang-color-Python     { background: #3572A5; }
      .lang-color-HTML       { background: #e34c26; }
      .lang-color-JavaScript { background: #f1e05a; }
      .lang-color-AMPL       { background: #6e8b74; }
      .lang-color-default    { background: #8e8e93; }

      /* Contribution card */
      .gh-contrib-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
      .gh-contrib-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
      .gh-contrib-img { width: 100%; border-radius: 8px; }

      /* Recent repos */
      .gh-section-title { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
      .gh-repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
      .gh-repo-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        padding: 16px 18px;
        text-decoration: none;
        color: inherit;
        display: block;
        transition: box-shadow 0.2s, transform 0.2s;
        border: 1px solid #eee;
      }
      .gh-repo-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.12); transform: translateY(-2px); color: inherit; text-decoration: none; }
      .gh-repo-name { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
      .gh-repo-desc { font-size: 12px; color: #888; margin-bottom: 10px; min-height: 16px; }
      .gh-repo-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: #aaa; }
      .gh-repo-lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
  </head>
  <body>
    <div class="gh-page-header">
      <div class="gh-header-bar">
        <div style="display:flex;align-items:center;gap:16px;">
          <a href="index.html" class="gh-back-btn"><i class="fas fa-arrow-left"></i> 返回</a>
          <h1 class="gh-title"><i class="fab fa-github"></i> GITHUB</h1>
        </div>
        <a href="https://github.com/luboblu" target="_blank" class="gh-open-btn">
          開啟 GitHub <i class="fas fa-external-link-alt" style="font-size:11px;"></i>
        </a>
      </div>
    </div>

    <div class="gh-main">
      <!-- 上方兩欄 -->
      <div class="gh-top-grid">
        <!-- 左：Profile + stats + lang -->
        <div class="gh-card">
          <div style="display:flex;align-items:center;">
            <img id="gh-avatar" src="" alt="avatar" class="gh-profile-avatar" />
            <div>
              <div class="gh-profile-login" id="gh-login">luboblu</div>
              <div class="gh-profile-name" id="gh-name">盧信廷 Lu Bob</div>
              <div class="gh-profile-updated">更新於 <span id="gh-updated">—</span></div>
            </div>
          </div>

          <div class="gh-stat-row">
            <div class="gh-stat-box">
              <div class="gh-stat-num" id="gh-repos">—</div>
              <div class="gh-stat-label">公開 Repos</div>
              <div class="gh-stat-sub">Public repositories</div>
            </div>
            <div class="gh-stat-box">
              <div class="gh-stat-num" id="gh-stars">—</div>
              <div class="gh-stat-label">Stars 獲得</div>
              <div class="gh-stat-sub">Total stars received</div>
            </div>
          </div>

          <div class="gh-langs" id="gh-langs-section">
            <!-- JS 填入 -->
          </div>
        </div>

        <!-- 右：Contribution heatmap -->
        <div class="gh-card">
          <div class="gh-contrib-title">貢獻活動紀錄</div>
          <div class="gh-contrib-sub" id="gh-contrib-sub">GitHub 公開貢獻紀錄</div>
          <img
            src="https://ghchart.rshah.org/luboblu"
            alt="GitHub contribution chart"
            class="gh-contrib-img"
            onerror="this.style.display='none'"
          />
        </div>
      </div>

      <!-- 最近 Repos -->
      <div class="gh-section-title">最近更新</div>
      <div class="gh-repo-grid" id="gh-repo-grid">
        <!-- JS 填入 -->
      </div>
    </div>

    <script>
      const LANG_COLORS = {
        Python: '#3572A5', HTML: '#e34c26', JavaScript: '#f1e05a',
        AMPL: '#6e8b74', CSS: '#563d7c', TypeScript: '#2b7489',
      };

      fetch('data/github-stats.json')
        .then(r => r.json())
        .then(data => {
          document.getElementById('gh-avatar').src = data.avatar_url;
          document.getElementById('gh-login').textContent = data.login;
          document.getElementById('gh-name').textContent = data.name;
          document.getElementById('gh-updated').textContent = data.updated_at;
          document.getElementById('gh-repos').textContent = data.total_repos;
          document.getElementById('gh-stars').textContent = data.total_stars;

          // Language bars
          const maxCount = data.top_languages[0]?.count || 1;
          const langsHtml = data.top_languages.map(l => {
            const color = LANG_COLORS[l.language] || '#8e8e93';
            const pct = Math.round(l.count / maxCount * 100);
            return `
              <div class="gh-lang-row">
                <span class="gh-lang-name">${l.language}</span>
                <div class="gh-lang-bar-wrap">
                  <div class="gh-lang-bar" style="width:${pct}%;background:${color};"></div>
                </div>
                <span class="gh-lang-count">${l.count}</span>
              </div>`;
          }).join('');
          document.getElementById('gh-langs-section').innerHTML =
            `<div style="font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:12px;">主要語言</div>` + langsHtml;

          // Recent repos
          const repoHtml = data.recent_repos.map(r => {
            const color = LANG_COLORS[r.language] || '#8e8e93';
            const lang = r.language || 'N/A';
            const desc = r.description || '';
            return `
              <a class="gh-repo-card" href="${r.url}" target="_blank">
                <div class="gh-repo-name"><i class="fas fa-book" style="font-size:11px;color:#aaa;margin-right:6px;"></i>${r.name}</div>
                <div class="gh-repo-desc">${desc}</div>
                <div class="gh-repo-meta">
                  <span><span class="gh-repo-lang-dot" style="background:${color};"></span>${lang}</span>
                  <span><i class="fas fa-star" style="font-size:10px;"></i> ${r.stars}</span>
                  <span><i class="fas fa-clock" style="font-size:10px;"></i> ${r.updated_at}</span>
                </div>
              </a>`;
          }).join('');
          document.getElementById('gh-repo-grid').innerHTML = repoHtml;
        })
        .catch(() => {
          document.getElementById('gh-repo-grid').innerHTML =
            '<p style="color:#aaa;text-align:center;">資料載入失敗</p>';
        });
    </script>
  </body>
</html>
